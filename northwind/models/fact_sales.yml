version: 2

models:
  - name: fact_sales
    description: Sales level fact table. Transaction fact table. One row per line item ordered. Includes product data
    columns:
      - name: OrderId
        description: Degenerate dimension for of the sale.
        tests:
          - not_null
      - name: customerkey
        description: Dimension key for dim_customer
      - name: employeekey
        description: Dimension key for dim_employee
      - name: orderdatekey
        description: Role-play Order Date Dimension key for dim_date
      - name: productkey
        description: Dimension key for dim_product
        tests:
          - not_null
      - name: quantity
        description: Additive fact for total quantity of product sold on order
      - name: extendedpriceamount
        description: Additive fact for total amount of product on order (quantity * product price)
      - name: discountamount
        description: Additive fact for total discount of extendedpriceamount * discount
      - name: soldamount
        description: Additive fact for total amount after discount (extendedpriceamount - discountamount)
